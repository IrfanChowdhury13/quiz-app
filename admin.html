<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>

  <div class="dashboard" style="display:none;">
    <h2>Quiz Dashboard</h2>
    <input type="text" id="q" placeholder="Question">
    <input type="text" id="opt1" placeholder="Option 1">
    <input type="text" id="opt2" placeholder="Option 2">
    <input type="text" id="opt3" placeholder="Option 3">
    <input type="text" id="opt4" placeholder="Option 4">
    <input type="text" id="ans" placeholder="Correct Answer">
    <button onclick="addQuestion()">Add Question</button>
    <p id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
