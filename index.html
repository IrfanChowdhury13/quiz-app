<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islamic Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="quiz-wrapper" style="text-align:center; width:100%; margin-top:20px;">
    <h1 style="font-size:24px; font-weight:bold; color:#007BFF; margin-bottom:15px;">Islamic Quiz</h1>
  </div>
  <div id="quiz-container">
    <h2 id="question"></h2>
    <div id="options" class="options-grid"></div>
    <p id="answer-feedback"></p>
    <p id="timer"></p>
    <button id="next-btn" onclick="nextQuestion()">Next Question</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
